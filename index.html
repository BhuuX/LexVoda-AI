<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="LexVoda AI: Sovereign Electoral Intelligence Operating System. Empowering 968M+ citizens with high-precision constitutional protocols." />
    <meta name="author" content="BhuuX Studio" />
    <title>LexVoda AI | Sovereign Intelligence OS 🏛️⚡</title>
    <!-- Strict Content Security Policy (Enterprise Grade) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://translate.google.com https://translate.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://translate.googleapis.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net wss://*.firebaseio.com;">
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      .goog-te-banner-frame { display: none !important; }
      body { top: 0px !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en', 
          includedLanguages: 'en,hi,mr,ta,te,kn,ml,gu,bn,pa,ur', 
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }

      // Aggressive removal of Google Translate Top Bar
      const observer = new MutationObserver(() => {
        const banner = document.querySelector('.goog-te-banner-frame');
        if (banner) {
          banner.style.display = 'none';
          banner.style.visibility = 'hidden';
          document.body.style.top = '0px';
        }
        const skiptranslate = document.querySelectorAll('.skiptranslate');
        skiptranslate.forEach(el => {
          if (el.tagName === 'IFRAME') el.style.display = 'none';
        });
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
