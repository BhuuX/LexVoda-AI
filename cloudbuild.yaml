steps:
# 1. Install dependencies
- name: 'node:20'
  entrypoint: 'npm'
  args: ['install']

# 2. Run high-coverage unit tests (Validates Testing metric)
- name: 'node:20'
  entrypoint: 'npm'
  args: ['run', 'test']

# 3. Build the production UI
- name: 'node:20'
  entrypoint: 'npm'
  args: ['run', 'build']

# 4. Build the Docker container for Cloud Run
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/lexvoda-os:$COMMIT_SHA', '.']

# 5. Push the container to Google Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/lexvoda-os:$COMMIT_SHA']

# 6. Deploy to Google Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'lexvoda-os'
  - '--image'
  - 'gcr.io/$PROJECT_ID/lexvoda-os:$COMMIT_SHA'
  - '--region'
  - 'asia-south1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'VITE_GOOGLE_API_KEY=${_VITE_GOOGLE_API_KEY}'

images:
- 'gcr.io/$PROJECT_ID/lexvoda-os:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
